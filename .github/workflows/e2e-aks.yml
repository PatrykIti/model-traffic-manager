name: e2e-aks

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Scope tfvars profile to use
        required: true
        default: dev1
      suite:
        description: Validation profile id from the suite registry
        required: true
        default: e2e-aks
      kubernetes_version:
        description: Optional Kubernetes version override
        required: false
        default: ""

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  e2e-aks:
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: "true"
      E2E_NAMESPACE: e2e-router
      GHCR_OWNER: ${{ github.repository_owner }}
      GHCR_USERNAME: ${{ github.actor }}
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      KUBERNETES_VERSION: ${{ inputs.kubernetes_version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Authenticate to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Sync environment
        run: uv sync --frozen --python "$(cat .python-version)"

      - name: Show available suite ids
        run: python3 scripts/release/validation_suite_registry.py list

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run AKS validation profile
        run: bash scripts/release/run_azure_test_suite.sh "${{ inputs.suite }}" "${{ inputs.environment }}"

      - name: Upload AKS validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-aks-artifacts-${{ inputs.suite }}-${{ github.run_id }}
          path: ${{ runner.temp }}/mtm-artifacts
