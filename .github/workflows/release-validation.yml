name: release-validation

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Scope tfvars profile to use
        required: true
        default: prd1

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build release suite matrix
        id: matrix
        run: echo "matrix=$(python3 scripts/release/validation_suite_registry.py matrix release)" >> "$GITHUB_OUTPUT"

  release-suite:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    env:
      TF_IN_AUTOMATION: "true"
      E2E_NAMESPACE: e2e-router
      GHCR_OWNER: ${{ github.repository_owner }}
      GHCR_USERNAME: ${{ github.actor }}
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      VALIDATION_ARTIFACTS_ROOT: ${{ runner.temp }}/mtm-artifacts

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Authenticate to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Sync environment
        run: uv sync --frozen --python "$(cat .python-version)"

      - name: Log in to GHCR
        if: ${{ matrix.requires_image }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run release validation suite
        run: bash scripts/release/run_azure_test_suite.sh "${{ matrix.suite }}" "${{ inputs.environment }}"

      - name: Upload release suite artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-validation-${{ matrix.suite }}-${{ github.run_id }}
          path: ${{ runner.temp }}/mtm-artifacts
