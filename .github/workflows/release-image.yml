name: release-image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing git tag to publish as a GHCR release image
        required: true

permissions:
  contents: read
  packages: write

concurrency:
  group: release-image-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  publish-image:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: release-tag
        shell: bash
        run: |
          tag="${{ github.ref_name }}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          fi
          if [[ -z "$tag" ]]; then
            echo "Release tag is required." >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ steps.release-tag.outputs.tag }}

      - name: Resolve image name
        id: image-name
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/model-traffic-manager" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image-name.outputs.name }}
          tags: |
            type=raw,value=${{ steps.release-tag.outputs.tag }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=model-traffic-manager
            org.opencontainers.image.description=Azure-native AI traffic router for AKS and Azure OpenAI
            org.opencontainers.image.version=${{ steps.release-tag.outputs.tag }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
