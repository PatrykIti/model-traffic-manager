router:
  instance_name: deployments-chat-regional-failover
  timeout_ms: 30000
  max_attempts: 3
  retryable_status_codes: [429, 500, 502, 503, 504]
  health:
    failure_threshold: 3
    cooldown_seconds: 30
    half_open_after_seconds: 60

deployments:
  - id: assistant-chat
    kind: llm
    protocol: openai_chat
    routing:
      strategy: tiered_failover
    limits:
      max_concurrency: 50
      request_rate_per_second: 20
    upstreams:
      - id: aoai-weu-primary
        provider: azure_openai
        account: aoai-prod-01
        region: westeurope
        tier: 0
        weight: 100
        endpoint: https://aoai-prod-01.openai.azure.com/openai/v1/chat/completions
        auth:
          mode: managed_identity
          scope: https://cognitiveservices.azure.com/.default
      - id: aoai-neu-secondary
        provider: azure_openai
        account: aoai-dr-01
        region: northeurope
        tier: 1
        weight: 100
        endpoint: https://aoai-dr-01.openai.azure.com/openai/v1/chat/completions
        auth:
          mode: managed_identity
          scope: https://cognitiveservices.azure.com/.default
      - id: aoai-seu-last-resort
        provider: azure_openai
        account: aoai-dr-02
        region: swedencentral
        tier: 2
        weight: 100
        endpoint: https://aoai-dr-02.openai.azure.com/openai/v1/chat/completions
        auth:
          mode: managed_identity
          scope: https://cognitiveservices.azure.com/.default

shared_services: {}
