router:
  instance_name: inbound-entra-example
  timeout_ms: 30000
  max_attempts: 3
  retryable_status_codes: [429, 500, 502, 503, 504]
  health:
    failure_threshold: 3
    cooldown_seconds: 30
    half_open_after_seconds: 60
  inbound_auth:
    providers:
      - kind: entra_id
        tenant_id: 11111111-1111-1111-1111-111111111111
        audiences: [api://mtm-router-api]
        applications:
          - client_app_id: 22222222-2222-2222-2222-222222222222
            display_name: Bot System Backend
            consumer_role: bot-system-be
            required_app_roles: [invoke.router]

deployments:
  - id: assistant-chat
    consumer_role: bot-system-be
    kind: llm
    protocol: openai_chat
    routing:
      strategy: tiered_failover
    limits:
      max_concurrency: 10
      request_rate_per_second: 5
    upstreams:
      - id: primary
        provider: azure_openai
        account: aoai-prod-01
        region: westeurope
        tier: 0
        weight: 100
        endpoint: https://example.invalid/chat/completions
        auth:
          mode: managed_identity
          scope: https://cognitiveservices.azure.com/.default

shared_services: {}
