router:
  instance_name: auth-identity-mixed-modes
  timeout_ms: 30000
  max_attempts: 3
  retryable_status_codes: [429, 500, 502, 503, 504]
  health:
    failure_threshold: 3
    cooldown_seconds: 30
    half_open_after_seconds: 60

deployments:
  - id: assistant-chat
    kind: llm
    protocol: openai_chat
    routing:
      strategy: tiered_failover
    limits:
      max_concurrency: 50
      request_rate_per_second: 20
    upstreams:
      - id: aoai-primary
        provider: azure_openai
        account: aoai-prod-01
        region: westeurope
        tier: 0
        weight: 100
        endpoint: https://aoai-prod-01.openai.azure.com/openai/v1/chat/completions
        auth:
          mode: managed_identity
          scope: https://cognitiveservices.azure.com/.default
      - id: third-party-fallback
        provider: external_openai_compatible
        account: fallback-vendor
        region: eu
        tier: 1
        weight: 100
        endpoint: https://fallback-vendor.example/api/chat/completions
        auth:
          mode: api_key
          header_name: api-key
          secret_ref: env://THIRD_PARTY_LLM_API_KEY

  - id: assistant-embeddings
    kind: embeddings
    protocol: openai_embeddings
    routing:
      strategy: tiered_failover
    limits:
      max_concurrency: 100
      request_rate_per_second: 50
    upstreams:
      - id: embeddings-primary
        provider: azure_openai
        account: aoai-emb-prod-01
        region: westeurope
        tier: 0
        weight: 100
        endpoint: https://aoai-emb-prod-01.openai.azure.com/openai/deployments/text-embedding-3-large/embeddings
        auth:
          mode: managed_identity
          scope: https://cognitiveservices.azure.com/.default

shared_services:
  transcript_registry:
    transport: http_json
    access_mode: router_proxy
    provider_managed_availability: true
    routing_strategy: single_endpoint
    limits:
      max_concurrency: 20
      request_rate_per_second: 10
    upstreams:
      - id: transcript-registry-primary
        provider: internal_api
        account: platform
        region: local
        tier: 0
        weight: 100
        endpoint: https://platform.internal.example/transcript-registry
        auth:
          mode: none

  conversation_archive:
    transport: http_json
    access_mode: direct_backend_access
    provider_managed_availability: true
    provider: azure_storage
    account: convo-archive
    region: westeurope
    endpoint: https://convoarchive.blob.core.windows.net
    auth:
      mode: managed_identity
      scope: https://storage.azure.com/.default
